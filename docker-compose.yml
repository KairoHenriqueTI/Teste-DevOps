version: '3.8'
services:
  php:
    build:
      context: ./php
    container_name: php-fpm
    env_file:
      - .env
    volumes:
      - ./src:/var/www/html
    expose:
      - "9000"

  web:
    image: nginx:alpine
    container_name: nginx-web
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
